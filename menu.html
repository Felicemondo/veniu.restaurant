<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Menu — Veniu</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=JetBrains+Mono:wght@400;500&family=Allura&family=Italianno&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap">

<style>
/* ── Menu page extras ─────────────────────────── */
.menu-hero {
  padding: 140px 0 70px;
  background:
    radial-gradient(ellipse 60% 50% at 80% 40%, oklch(0.26 0.04 62 / 0.4) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 15% 70%, oklch(0.22 0.025 55 / 0.18) 0%, transparent 60%);
  border-bottom: 1px solid var(--line);
}
.menu-hero-inner {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 40px;
  flex-wrap: wrap;
}
.menu-hero h1 {
  font-size: clamp(48px, 7vw, 100px);
  margin: 16px 0 0;
}
.menu-hero .sub {
  color: var(--fg-dim);
  font-size: 18px;
  max-width: 44ch;
  margin: 16px 0 0;
}
.coperto-note {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-mute);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 10px 18px;
  white-space: nowrap;
  align-self: flex-end;
}

/* ── Sticky filter bar ────────────────────────── */
.filter-bar {
  position: sticky;
  top: 72px;
  z-index: 40;
  background: oklch(0.16 0.005 250 / 0.9);
  backdrop-filter: blur(14px) saturate(130%);
  border-bottom: 1px solid var(--line);
  padding: 0;
}
.filter-bar-inner {
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* category tabs */
.cat-tabs {
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--line);
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  padding: 16px 20px;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
  transition: color .2s, border-color .2s;
  flex-shrink: 0;
}
.cat-tab:hover { color: var(--fg); }
.cat-tab.active { color: var(--ember); border-bottom-color: var(--ember); }

/* allergen filter row */
.allergy-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  flex-wrap: wrap;
}
.allergy-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  white-space: nowrap;
  flex-shrink: 0;
}
.allergy-chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.allergy-chip {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 6px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  color: var(--fg-mute);
  transition: background .15s, border-color .15s, color .15s;
  cursor: pointer;
  user-select: none;
}
.allergy-chip:hover { color: var(--fg); border-color: var(--fg-mute); }
.allergy-chip.active {
  background: oklch(0.55 0.21 28 / 0.18);
  border-color: oklch(0.55 0.21 28 / 0.7);
  color: oklch(0.80 0.10 28);
}

/* search */
.search-wrap {
  position: relative;
}
.search-input {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 16px 8px 36px;
  color: var(--fg);
  font-family: var(--sans);
  font-size: 14px;
  width: 240px;
  transition: border-color .2s, width .3s;
  outline: none;
}
.search-input::placeholder { color: var(--fg-mute); }
.search-input:focus { border-color: var(--ember); width: 300px; }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg-mute);
  font-size: 14px;
  pointer-events: none;
}

/* ── Menu content ─────────────────────────────── */
.menu-body { padding: 60px 0 100px; }

.menu-category {
  margin-bottom: 72px;
}
.menu-category[data-cat].hidden { display: none; }

.cat-header {
  display: flex;
  align-items: baseline;
  gap: 20px;
  margin-bottom: 32px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.cat-header h2 {
  font-size: clamp(28px, 3.5vw, 44px);
  margin: 0;
}
.cat-header .cat-count {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--fg-mute);
  text-transform: uppercase;
}

/* item grid */
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}

/* item card */
.item-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color .2s, transform .2s;
  position: relative;
}
.item-card:hover {
  border-color: oklch(0.38 0.015 80);
  transform: translateY(-2px);
}
.item-card.hidden { display: none; }

.item-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.item-name {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.01em;
  line-height: 1.2;
}
.item-price {
  font-family: var(--display);
  font-size: 20px;
  font-weight: 600;
  color: var(--ember);
  white-space: nowrap;
  line-height: 1;
}
.item-price .unit {
  font-size: 12px;
  font-family: var(--mono);
  font-weight: 400;
  color: var(--fg-mute);
  display: block;
  text-align: right;
  margin-top: 2px;
}
.item-desc {
  font-size: 13.5px;
  color: var(--fg-dim);
  line-height: 1.5;
  flex: 1;
}
.item-beer {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--gold);
  opacity: 0.75;
}
.item-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 4px;
}
.item-allergens {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.allergen-tag {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 999px;
  background: oklch(0.22 0.008 250);
  border: 1px solid var(--line);
  color: var(--fg-mute);
  letter-spacing: 0.04em;
  cursor: default;
}
.allergen-tag.flagged {
  background: oklch(0.55 0.21 28 / 0.15);
  border-color: oklch(0.55 0.21 28 / 0.5);
  color: oklch(0.80 0.10 28);
}
.badge-new {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: oklch(0.66 0.09 75 / 0.18);
  border: 1px solid oklch(0.66 0.09 75 / 0.5);
  color: var(--ember);
  padding: 3px 9px;
  border-radius: 999px;
}
.badge-special {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: oklch(0.78 0.08 80 / 0.12);
  border: 1px solid oklch(0.78 0.08 80 / 0.4);
  color: var(--gold);
  padding: 3px 9px;
  border-radius: 999px;
}

/* no-results */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--fg-mute);
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: none;
}

/* allergen legend */
.allergen-legend {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 28px 32px;
  margin-top: 60px;
}
.allergen-legend h3 {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin: 0 0 18px;
}
.legend-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px 24px;
}
.legend-item {
  font-size: 13px;
  color: var(--fg-dim);
}
.legend-item strong {
  color: var(--fg);
  font-family: var(--mono);
  font-size: 11px;
}

/* back link */
.back-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  transition: color .2s;
  margin-bottom: 32px;
}
.back-link:hover { color: var(--fg); }

/* ── Responsive ───────────────────────────────── */
@media (max-width: 860px) {
  .menu-hero-inner { flex-direction: column; align-items: flex-start; }
  .filter-bar-top { flex-direction: column; align-items: flex-start; }
  .search-input { width: 100%; }
  .search-input:focus { width: 100%; }
  .items-grid { grid-template-columns: 1fr; }
  .allergy-row { flex-wrap: wrap; }
}
@media (max-width: 640px) {
  .cat-tab { padding: 14px 14px; font-size: 10px; }
  .allergy-chip { font-size: 10px; padding: 5px 10px; }
}
</style>

// ─── State ───────────────────────────────────────────────────────
let activeCat = 'all';
let activeAllergens = new Set();

// ─── Build DOM ───────────────────────────────────────────────────
function formatPrice(p) {
  if (typeof p === 'number') {
    return { main: p % 1 === 0 ? p + '€' : p.toFixed(2).replace('.', ',') + '€', unit: null };
  }
  // string like '12€/etto' or '0.25L €4,5 · 0.50L €6,5'
  if (p.includes('/etto')) return { main: p.replace('/etto',''), unit: '/etto' };
  return { main: p, unit: null };
}

function buildCard(item) {
  const div = document.createElement('div');
  div.className = 'item-card';
  div.dataset.cat = item.cat;
  div.dataset.allergens = JSON.stringify(item.allergens || []);

  const { main, unit } = formatPrice(item.price);

  const badges = [];
  if (item.isNew) badges.push('<span class="badge-new">Novità</span>');
  if (item.cat === 'special') badges.push('<span class="badge-special">Special</span>');

  const allergenTags = (item.allergens || []).map(n =>
    `<span class="allergen-tag" data-num="${n}" title="${ALLERGEN_NAMES[n]}">${n}</span>`
  ).join('');

  div.innerHTML = `
    <div class="item-top">
      <div class="item-name">${item.name}</div>
      <div class="item-price">
        ${main}
        ${unit ? `<span class="unit">${unit}</span>` : ''}
      </div>
    </div>
    ${item.desc ? `<div class="item-desc">${item.desc}</div>` : ''}
    ${item.beer ? `<div class="item-beer">${item.beer}</div>` : ''}
    <div class="item-footer">
      <div class="item-allergens">${allergenTags}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${badges.join('')}</div>
    </div>
  `;
  return div;
}

function buildSection(cat) {
  const section = document.createElement('section');
  section.className = 'menu-category';
  section.dataset.cat = cat.id;

  const items = ITEMS.filter(i => i.cat === cat.id);
  const header = document.createElement('div');
  header.className = 'cat-header';
  header.innerHTML = `
    <h2 class="display" id="cat-${cat.id}">${cat.label}</h2>
    <span class="cat-count" data-count-for="${cat.id}">${items.length} piatti</span>
  `;
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'items-grid';
  items.forEach(item => grid.appendChild(buildCard(item)));
  section.appendChild(grid);
  return section;
}

// ─── Init ────────────────────────────────────────────────────────
const body = document.getElementById('menu-body');
const wrap = body.querySelector('.wrap');
const noResults = document.getElementById('no-results');

CATEGORIES.forEach(cat => {
  if (ITEMS.some(i => i.cat === cat.id)) {
    wrap.appendChild(buildSection(cat));
  }
});

// allergen legend
const legend = document.createElement('div');
legend.className = 'allergen-legend';
legend.innerHTML = `
  <h3>Legenda allergeni</h3>
  <div class="legend-grid">
    ${Object.entries(ALLERGEN_NAMES).map(([k,v]) =>
      `<div class="legend-item"><strong>${k}</strong> — ${v}</div>`
    ).join('')}
  </div>
`;
wrap.appendChild(legend);

// ─── Filter logic ─────────────────────────────────────────────────
function applyFilters() {
  const sections = wrap.querySelectorAll('.menu-category');
  let anyVisible = false;

  sections.forEach(section => {
    const cat = section.dataset.cat;
    const catMatch = activeCat === 'all' || activeCat === cat;

    if (!catMatch) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';

    const cards = section.querySelectorAll('.item-card');
    let sectionVisible = 0;
    cards.forEach(card => {
      const allergens = JSON.parse(card.dataset.allergens);
      const hasConflict = [...activeAllergens].some(a => allergens.includes(Number(a)));
      if (hasConflict) {
        card.classList.add('hidden');
      } else {
        card.classList.remove('hidden');
        sectionVisible++;
      }
    });

    // update count
    const countEl = section.querySelector('[data-count-for]');
    if (countEl) countEl.textContent = sectionVisible + (sectionVisible === 1 ? ' piatto' : ' piatti');

    if (sectionVisible === 0) {
      section.style.display = 'none';
    } else {
      anyVisible = true;
    }

    // highlight allergen tags on visible cards
    section.querySelectorAll('.allergen-tag').forEach(tag => {
      const num = tag.dataset.num;
      tag.classList.toggle('flagged', activeAllergens.has(num));
    });
  });

  noResults.style.display = anyVisible ? 'none' : 'block';
  legend.style.display = '';
}

// ─── Category tabs ────────────────────────────────────────────────
document.getElementById('cat-tabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeCat = tab.dataset.cat;
  applyFilters();

  if (activeCat !== 'all') {
    const target = document.getElementById('cat-' + activeCat);
    if (target) {
      const offset = target.getBoundingClientRect().top + window.scrollY - 160;
      window.scrollTo({ top: offset, behavior: 'smooth' });
    }
  }
});

// ─── Allergen chips ───────────────────────────────────────────────
document.getElementById('allergy-chips').addEventListener('click', e => {
  const chip = e.target.closest('.allergy-chip');
  if (!chip) return;
  const a = chip.dataset.allergen;
  if (activeAllergens.has(a)) {
    activeAllergens.delete(a);
    chip.classList.remove('active');
  } else {
    activeAllergens.add(a);
    chip.classList.add('active');
  }
  applyFilters();
});

// ─── Initial render ───────────────────────────────────────────────
applyFilters();

// ─── Scroll reveal ────────────────────────────────────────────────
const io = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.08 });
document.querySelectorAll('.reveal').forEach(el => io.observe(el));
</script>
</body>
</html>
